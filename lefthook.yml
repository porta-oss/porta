pre-commit:
  parallel: true
  commands:
    lint:
      glob: "*.{js,ts,jsx,tsx,json,jsonc,css}"
      run: bun x biome check --no-errors-on-unmatched --files-ignore-unknown=true {staged_files}
      stage_fixed: true
    typecheck:
      run: bun run typecheck

pre-push:
  commands:
    test-full:
      run: bun x vitest run
