# Porta Web — Railway service config
# Builds the Vite SPA and serves it with nginx.
# API_URL and WEB_URL are injected at container start into /env.js.

[build]
builder = "DOCKERFILE"
dockerfilePath = "apps/web/Dockerfile"
watchPatterns = ["/apps/web/**", "/packages/shared/**", "/package.json", "/bun.lock", "/tsconfig.base.json"]

[deploy]
healthcheckPath = "/"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
