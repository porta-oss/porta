# Porta Web — Railway service config
# Builds the Vite SPA and serves it with a static file server.
# The API_URL env var must point to the deployed API service URL.

[build]
builder = "nixpacks"
buildCommand = "bun install --frozen-lockfile && cd apps/web && bun run build"

[deploy]
startCommand = "npx serve apps/web/dist -s -l tcp://0.0.0.0:$PORT"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
