# Porta Worker — Railway service config
# Builds with Bun, runs with Node for native module compatibility (pg, ioredis, bullmq).
# Requires Postgres and Redis services provisioned in the same project.
# No public port — this is a background job processor.

[build]
builder = "DOCKERFILE"
dockerfilePath = "apps/worker/Dockerfile"
watchPatterns = ["/apps/worker/**", "/packages/shared/**", "/package.json", "/bun.lock", "/tsconfig.base.json"]

[deploy]
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 5
