# Porta — Self-host Docker Compose stack
# Usage: docker compose up --build
# All five services start without manual sequencing.

services:
  postgres:
    image: postgres:16-alpine
    container_name: porta-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-porta}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-porta}"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s

  redis:
    image: redis:7-alpine
    container_name: porta-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 3s

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    container_name: porta-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORTA_EDITION: ${PORTA_EDITION:-community}
      API_HOST: "0.0.0.0"
      API_PORT: "3000"
      API_URL: "http://api:3000"
      WEB_URL: "http://localhost"
      BETTER_AUTH_URL: "http://api:3000"
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET is required}
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-porta}
      REDIS_URL: redis://redis:6379
      CONNECTOR_ENCRYPTION_KEY: ${CONNECTOR_ENCRYPTION_KEY:?CONNECTOR_ENCRYPTION_KEY is required}
      MAGIC_LINK_SENDER_EMAIL: ${MAGIC_LINK_SENDER_EMAIL:-dev@porta.local}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      AUTH_CONTEXT_TIMEOUT_MS: ${AUTH_CONTEXT_TIMEOUT_MS:-5000}
      DATABASE_CONNECT_TIMEOUT_MS: ${DATABASE_CONNECT_TIMEOUT_MS:-10000}
      DATABASE_POOL_MAX: ${DATABASE_POOL_MAX:-10}
      FOUNDER_PROOF_MODE: ${FOUNDER_PROOF_MODE:-}
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health | grep -q '\"status\":\"ok\"'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web
    container_name: porta-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "80:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/ | grep -q 'html'"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 5s

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
    container_name: porta-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-porta}
      REDIS_URL: redis://redis:6379
      CONNECTOR_ENCRYPTION_KEY: ${CONNECTOR_ENCRYPTION_KEY:?CONNECTOR_ENCRYPTION_KEY is required}
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-3}
      JOB_TIMEOUT_MS: ${JOB_TIMEOUT_MS:-30000}

volumes:
  postgres-data:
